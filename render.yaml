services:
  # 1. API Web Service
  - type: web
    name: seo-geo-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FREE_MODE
        value: "true"

  # 2. Redis Instance (Required for BullMQ)
  - type: redis
    name: redis
    plan: free
    ipAllowList: [] # Only allow internal access
